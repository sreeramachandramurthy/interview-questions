site_name: Interview Questions
repo_url: https://github.com/sreeramachandramurthy/interview-questions

nav:
  - 'Home': 'index.md'
  - 'Programming':
    - 'Index': 'programming/index.md'
    - 'SOLID Principles': 'programming/solid-principles/solid-principles.md'
    - 'Databases': 'programming/databases/databases.md'
  - 'Languages':
    - 'Index': 'languages/index.md'
    - 'Java': 'languages/java/core-java.md'
  - 'Tools':
    - 'Index': 'tools/index.md'
    - 'Kafka': 'tools/kafka/kafka.md'
    - 'Mongo DB': 'tools/mongo-db/mongo-db.md'

extra_css:
  - extra.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - tables

theme:
  name: material
  features:
    # - navigation.expand
    - content.code.copy
    - navigation.tabs
    - navigation.path
  palette:
    # Palette toggle for Automatic Mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to Light Mode
    # Palette toggle for Light Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to Dark Mode
    # Palette toggle for Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to System preference
